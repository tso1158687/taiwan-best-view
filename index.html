<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taiwan Best View</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">本機案件草稿器</p>
        <h1>Taiwan Best View</h1>
      </div>
      <div class="header-actions">
        <label class="import-button">
          匯入 JSON
          <input id="importInput" type="file" accept="application/json,.json">
        </label>
        <button type="button" id="resetButton" class="secondary-button">清空</button>
        <button type="button" id="downloadButton" class="primary-button">下載 JSON</button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-panel" aria-labelledby="caseFormTitle">
        <div class="section-heading">
          <h2 id="caseFormTitle">案件草稿</h2>
          <span id="saveState" class="status-pill">尚未儲存</span>
        </div>

        <form id="caseForm" class="case-form">
          <fieldset>
            <legend>案件分類</legend>
            <div class="form-grid">
              <label>
                縣市
                <select name="jurisdiction" required>
                  <option value="taipei">台北市</option>
                  <option value="new_taipei">新北市</option>
                </select>
              </label>
              <label>
                違規類型
                <select name="violationType" required>
                  <option value="illegal_parking">違規停車</option>
                </select>
              </label>
              <label>
                案件狀態
                <select name="status" required>
                  <option value="draft">草稿</option>
                  <option value="ready_for_review">待人工確認</option>
                  <option value="submitted">已送件</option>
                </select>
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>違規資訊</legend>
            <div class="form-grid">
              <label>
                車號
                <input name="plate" type="text" placeholder="ABC-1234" autocomplete="off" required>
              </label>
              <label>
                違規日期時間
                <input name="occurredAt" type="datetime-local" required>
              </label>
              <label>
                行政區
                <input name="district" type="text" placeholder="大安區" required>
              </label>
              <label>
                路段
                <input name="road" type="text" placeholder="信義路三段" required>
              </label>
              <label class="span-2">
                補充地點
                <input name="addressNote" type="text" placeholder="123號前人行道、路口方向、店家或地標">
              </label>
              <label>
                違規事實
                <input name="fact" type="text" value="違規停車" required>
              </label>
            </div>
            <label>
              違規事實說明
              <textarea name="description" rows="4" placeholder="車輛停放於人行道，妨礙行人通行" required></textarea>
            </label>
          </fieldset>

          <fieldset>
            <legend>附件</legend>
            <label class="file-drop">
              <input id="fileInput" name="files" type="file" accept="image/jpeg,image/png,image/bmp,image/tiff,image/heic,image/heif,video/quicktime,video/x-ms-wmv,video/x-msvideo,video/mp4,video/3gpp,video/mp2t,.heic,.heif,.gif,.flv,.mpeg,.mkv,.zip,.rar" multiple>
              <span>選擇 1 到 5 個照片或影片</span>
            </label>
            <p class="helper-text">HEIC/HEIF 會標示為需先轉成官方可接受格式，並在送件前檢查 EXIF 是否保留。</p>
            <div id="fileSummary" class="file-summary">尚未選擇附件</div>
            <div id="importedFileSummary" class="file-summary secondary-summary"></div>
            <ul id="fileList" class="file-list" aria-live="polite"></ul>
          </fieldset>
        </form>
      </section>

      <aside class="preview-panel" aria-labelledby="previewTitle">
        <section id="locationPanel" class="location-panel" aria-labelledby="locationTitle" hidden>
          <div class="section-heading compact-heading">
            <h2 id="locationTitle">地點候選</h2>
            <span id="locationState" class="status-pill warning">需確認</span>
          </div>
          <ul id="locationList" class="location-list"></ul>
        </section>

        <section id="photoAnalysisPanel" class="location-panel" aria-labelledby="photoAnalysisTitle" hidden>
          <div class="section-heading compact-heading">
            <h2 id="photoAnalysisTitle">照片線索</h2>
            <span id="photoAnalysisState" class="status-pill warning">需確認</span>
          </div>
          <ul id="photoAnalysisList" class="location-list"></ul>
        </section>

        <section id="suggestionsPanel" class="location-panel" aria-labelledby="suggestionsTitle" hidden>
          <div class="section-heading compact-heading">
            <h2 id="suggestionsTitle">欄位建議</h2>
            <span id="suggestionsState" class="status-pill warning">需確認</span>
          </div>
          <div id="suggestionsList" class="suggestion-list"></div>
        </section>

        <section id="caseRecordPanel" class="location-panel" aria-labelledby="caseRecordTitle" hidden>
          <div class="section-heading compact-heading">
            <h2 id="caseRecordTitle">案件紀錄</h2>
            <span id="caseRecordState" class="status-pill warning">需確認</span>
          </div>
          <div id="caseRecordList" class="case-record-list"></div>
        </section>

        <section id="readinessPanel" class="location-panel" aria-labelledby="readinessTitle" hidden>
          <div class="section-heading compact-heading">
            <h2 id="readinessTitle">送件檢查</h2>
            <span id="readinessState" class="status-pill warning">需確認</span>
          </div>
          <div id="readinessList" class="case-record-list"></div>
        </section>

        <div class="section-heading">
          <h2 id="previewTitle">JSON 預覽</h2>
          <span id="validationState" class="status-pill warning">需補資料</span>
        </div>
        <pre id="jsonPreview" class="json-preview">{}</pre>
      </aside>
    </main>

    <template id="fileItemTemplate">
      <li>
        <span>
          <span class="file-name"></span>
          <span class="file-badge"></span>
        </span>
        <span class="file-meta"></span>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
